<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Set Password · HP Financial</title>
<link rel="stylesheet" href="assets/theme.css">
<style>
  body{background:linear-gradient(160deg,var(--navy),#0c1d49);min-height:100vh;display:grid;place-items:center;padding:24px;}
  .card-auth{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;overflow:hidden;}
  .card-auth__head{padding:28px 28px 0;text-align:center;}
  .card-auth__head .brand__logo{width:48px;height:48px;margin:0 auto 14px;font-size:18px;}
  .card-auth__body{padding:24px 28px 28px;}
  .req-list{list-style:none;font-size:12px;color:var(--text-muted);margin-top:8px;display:grid;gap:5px;}
  .req-list li{display:flex;align-items:center;gap:7px;}
  .req-list .ok{color:var(--success);} .req-list .dot{width:6px;height:6px;border-radius:50%;background:var(--n-300);}
  .strength{height:6px;border-radius:20px;background:var(--n-200);margin-top:10px;overflow:hidden;}
  .strength>span{display:block;height:100%;width:70%;background:linear-gradient(90deg,var(--warning),var(--success));border-radius:20px;}
</style>
</head>
<body>
  <div class="card-auth">
    <div class="card-auth__head">
      <div class="brand__logo">HP</div>
      <h1 style="font-size:22px">Set a new password</h1>
      <p class="muted" style="margin-top:6px;font-size:13px">For your security, please replace the temporary password shared by your admin.</p>
    </div>
    <div class="card-auth__body">
      <div class="field">
        <label>New password <span class="req">*</span></label>
        <input class="input" type="password" value="MyNewPass1">
        <div class="strength"><span></span></div>
        <ul class="req-list">
          <li><span class="ok">✓</span> At least 8 characters</li>
          <li><span class="ok">✓</span> One uppercase letter</li>
          <li><span class="dot"></span> One number &amp; symbol recommended</li>
        </ul>
      </div>
      <div class="field">
        <label>Confirm new password <span class="req">*</span></label>
        <input class="input" type="password" value="MyNewPass1">
      </div>
      <a href="dashboard-admin.html" class="btn btn--primary w-full" style="height:44px;margin-top:6px">Save &amp; continue</a>
    </div>
  </div>
</body>
</html>
